<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#grad4)"/>
  <rect width="800" height="450" fill="url(#grid4)"/>

  <!-- Rounded Rectangle Border -->
  <rect width="800" height="450" rx="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Dashboard/Chart Area -->
  <g transform="translate(320, 140)">
    <!-- Dashboard frame -->
    <rect x="0" y="0" width="160" height="100" fill="none" stroke="white" stroke-width="2" rx="4"/>

    <!-- Chart bars (declining) -->
    <rect x="15" y="70" width="12" height="20" fill="white" opacity="0.8"/>
    <rect x="35" y="55" width="12" height="35" fill="white" opacity="0.7"/>
    <rect x="55" y="35" width="12" height="55" fill="white" opacity="0.6"/>
    <rect x="75" y="50" width="12" height="40" fill="white" opacity="0.5"/>
    <rect x="95" y="65" width="12" height="25" fill="white" opacity="0.4"/>
    <rect x="115" y="75" width="12" height="15" fill="white" opacity="0.3"/>

    <!-- Baseline -->
    <line x1="10" y1="90" x2="130" y2="90" stroke="white" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Broken Link Symbol (X through connection) -->
  <g transform="translate(420, 180)" stroke="white" stroke-width="3" fill="none">
    <!-- Connection line -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke-dasharray="5,5"/>
    <!-- X symbol (break) -->
    <line x1="-10" y1="-15" x2="10" y2="15"/>
    <line x1="10" y1="-15" x2="-10" y2="15"/>
    <!-- Nodes on either side -->
    <circle cx="-40" cy="0" r="6" fill="white"/>
    <circle cx="40" cy="0" r="6" fill="white"/>
  </g>

  <!-- Bottom Text -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="white" text-anchor="middle" letter-spacing="1">
    RPM Insights
  </text>
</svg>